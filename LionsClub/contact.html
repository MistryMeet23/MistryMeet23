<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lions Club</title>
        <link rel="stylesheet" href="style.css">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous">
    </head>
    <body>

        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">

                <a class="navbar-brand" href="#">
                    <img src="img/logo.png" alt="Logo" width="30" height="24"
                        class="d-inline-block align-text-top">
                    Lions Clubs International
                </a>

                <div class="collapse navbar-collapse"
                    id="navbarSupportedContent">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page"
                                href="index.html">Home</a>
                        </li>
                        <li><a class="nav-link active" aria-current="page"
                                href="services.html">Services</a></li>
                        <li><a class="nav-link active" aria-current="page"
                                href="images.html">Gallery</a></li>
                        <li><a class="nav-link active" aria-current="page"
                                href="contact.html">Contact</a></li>
                        <li><a class="nav-link active" aria-current="page"
                                href="about.html">About</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="contact-container">
            <section id="contact-form">
                <h2>Contact Us</h2>

                <form action="#" method="post">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Your Email:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Your Message:</label>
                    <textarea id="message" name="message" rows="4" required></textarea>

                    <button type="submit">Submit</button>
                </form>
            </section>

            <section id="contact-info">
                <h2>Contact Information</h2>
                <p>Email: contact@lionsclub.com</p>
                <p>Phone: +1 123-456-7890</p>
                <p>Address: 123 Lions Street, Cityville</p>
            </section>
        </main>

        <footer>
            <p>&copy; 2023 Lions Club</p>
        </footer>

    </body>
</html>
